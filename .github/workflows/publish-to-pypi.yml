name: Publish to PyPI

on:
  push:
    tags:
      - "*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.9.30"
          python-version: "3.13"
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Smoke test package
        run: |
          uv run --isolated --no-project --with ./dist/*.whl -- python -I -c "import eltetrado"
          uv run --isolated --no-project --with ./dist/*.tar.gz -- python -I -c "import eltetrado"

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
